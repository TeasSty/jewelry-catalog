backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Изделия"
    folder: "products"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Артикул"
        name: "title"
        widget: "string"
      - label: "Вес"
        name: "weight"
        widget: "string"
      - label: "Фото"
        name: "image"
        widget: "image"
