backend:
  name: git-gateway  # Используем Netlify Identity
  branch: main       # Или master, если у вас так

# Настройки медиафайлов (фотографии украшений)
media_folder: "static/images/uploads"
public_folder: "/images/uploads"

# Коллекции (что будет в админке)
collections:
  - name: "jewelry"
    label: "Украшения"
    label_singular: "Украшение"
    folder: "content/jewelry"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Название", name: "title", widget: "string" }
      - { label: "Описание", name: "description", widget: "text" }
      - { label: "Цена", name: "price", widget: "number", valueType: "int" }
      - { label: "Фотография", name: "image", widget: "image" }
      - { label: "Категория", name: "category", widget: "select", options: ["Кольца", "Серьги", "Подвески", "Браслеты"] }
      - { label: "В наличии", name: "inStock", widget: "boolean", default: true }
