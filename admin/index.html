<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Панель управления каталогом</title>
    <!-- Стили для красивой формы -->
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 400px;
            width: 90%;
        }
        .login-container h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            color: #1a1a1a;
            text-align: center;
        }
        .login-container p {
            margin: 0 0 30px 0;
            color: #666;
            text-align: center;
            font-size: 14px;
        }
        .login-container .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">💎</div>
        <h1>Панель управления каталогом</h1>
        <p>Войдите, чтобы управлять украшениями</p>

        <!-- Виджет Netlify Identity -->
        <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
        
        <script>
            // Настройка поведения после входа
            window.netlifyIdentity = window.netlifyIdentity || {};
            window.netlifyIdentity.on('init', function(user) {
                if (!user) {
                    // Если пользователь не залогинен — показываем виджет
                    window.netlifyIdentity.on('login', function() {
                        // После входа перенаправляем обратно в админку
                        document.location.href = '/admin/';
                    });
                } else {
                    // Если уже залогинен — сразу показываем CMS
                    document.location.href = '/admin/';
                }
            });

            // Когда виджет загрузится, открываем окно входа
            window.addEventListener('load', function() {
                // Небольшая задержка для инициализации
                setTimeout(function() {
                    if (window.netlifyIdentity && !window.netlifyIdentity.currentUser()) {
                        window.netlifyIdentity.open();
                    }
                }, 100);
            });
        </script>
    </div>

    <!-- Основной скрипт Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
