<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>Ювелирное производство · ИП Воронин</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ===== ВЕСЬ ТВОЙ СТАРЫЙ CSS (без изменений) ===== */
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      padding-top: 70px;
      line-height: 1.5;
    }
    a { color: inherit; text-decoration: none; }
    
    /* ===== НАВИГАЦИЯ ===== */
    .navbar {
      position: fixed;
      top:0; left:0; width:100%;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      height:70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      z-index: 1000;
    }
    .logo { font-weight:600; font-size:1.3rem; color:#fff; letter-spacing:0.5px; }
    .logo i { margin-right:8px; color:#aaa; }
    .nav-links { display:flex; gap:2rem; font-size:0.95rem; }
    .nav-links a { color:#ccc; transition:0.2s; cursor:pointer; }
    .nav-links a:hover { color:#fff; }
    .hamburger {
      display:none;
      font-size:1.5rem;
      color:#eee;
      cursor:pointer;
      background:none;
      border:none;
      padding:0.3rem 0.5rem;
      z-index:1001;
    }
    
    /* ===== МОБИЛЬНОЕ МЕНЮ (БУРГЕР) ===== */
    .mobile-menu {
      position:fixed;
      top:0; left:0;
      width:100%; height:100vh;
      background: #1a1a1a;
      z-index:999;
      display:flex;
      flex-direction:column;
      transform:translateX(100%);
      transition:transform 0.35s ease;
      padding:80px 1.5rem 2rem;
      pointer-events:none;
      overflow-y:auto;
    }
    .mobile-menu.open {
      transform:translateX(0);
      pointer-events:auto;
    }
    .mobile-menu::-webkit-scrollbar { width:3px; background:#2a2a2a; }
    .mobile-menu::-webkit-scrollbar-thumb { background:#555; border-radius:10px; }
    
    .mobile-close {
      position:absolute;
      top:1.5rem; right:2rem;
      font-size:2rem;
      color:#aaa;
      cursor:pointer;
      background:none;
      border:none;
      z-index:1001;
    }
    .mobile-close:hover { color:#fff; }
    
    .mobile-nav-links {
      display:flex;
      flex-direction:column;
      gap:0.5rem;
      margin-bottom:1.5rem;
    }
    .mobile-nav-links a {
      font-size:1.2rem;
      color:#ddd;
      padding:0.6rem 0;
      border-bottom:1px solid #2a2a2a;
      cursor:pointer;
      transition:0.2s;
    }
    .mobile-nav-links a:hover { color:#fff; }
    
    .mobile-divider {
      border-top:1px solid #2a2a2a;
      margin:0.5rem 0 1rem 0;
      opacity:0.5;
    }
    
    .mobile-catalog {
      flex:1;
      overflow-y:auto;
      padding-bottom:2rem;
    }
    .mobile-catalog .menu-item {
      cursor:pointer;
      user-select:none;
    }
    .mobile-catalog .menu-item .label {
      padding:0.6rem 0.5rem;
      display:flex;
      justify-content:space-between;
      align-items:center;
      color:#b0b0b0;
      border-bottom:1px solid #2a2a2a;
      transition:0.1s;
    }
    .mobile-catalog .menu-item .label:hover {
      background:#2a2a2a;
      color:#fff;
    }
    .mobile-catalog .menu-item.active > .label {
      background:#2a2a2a;
      color:#fff;
    }
    .mobile-catalog .menu-item .label i.fa-chevron-down {
      font-size:0.7rem;
      color:#666;
      transition:0.2s;
    }
    .mobile-catalog .menu-item.open > .label i.fa-chevron-down {
      transform:rotate(180deg);
    }
    .mobile-catalog .sub-items {
      max-height:0;
      overflow:hidden;
      transition:max-height 0.3s ease;
    }
    .mobile-catalog .sub-items.open {
      max-height:400px;
    }
    .mobile-catalog .sub-items .sub-item {
      padding:0.4rem 0.5rem 0.4rem 1.5rem;
      display:block;
      color:#999;
      border-bottom:1px solid #222;
      transition:0.1s;
      cursor:pointer;
    }
    .mobile-catalog .sub-items .sub-item:hover {
      background:#2a2a2a;
      color:#fff;
    }
    .mobile-catalog .sub-items .sub-item.active {
      background:#2a2a2a;
      color:#fff;
    }
    .mobile-catalog .menu-item-spacer { height:2px; }
    .mobile-catalog .menu-item-bracelets { margin-bottom:4px; }
    
    /* ===== ГЕРОЙ ===== */
    .hero {
      padding: 3rem 2rem 2rem;
      text-align: center;
      border-bottom:1px solid #2a2a2a;
      scroll-margin-top: 70px;
    }
    .hero h1 { font-weight:400; font-size:2.6rem; letter-spacing:1px; color:#fff; }
    .hero p { color:#aaa; margin-top:0.25rem; }
    
    /* ===== КАТАЛОГ ===== */
    .catalog-layout {
      display:flex;
      gap:2rem;
      padding:2rem;
      max-width:1440px;
      margin:0 auto;
      align-items:flex-start;
      scroll-margin-top: 70px;
    }
    
    /* ===== БОКОВОЕ МЕНЮ (ДЕСКТОП) ===== */
    .sidebar {
      position: sticky;
      top:90px;
      width:240px;
      flex-shrink:0;
      background:#1e1e1e;
      border-radius:12px;
      padding:0.5rem 0;
      border:1px solid #2a2a2a;
      max-height:calc(100vh - 110px);
      overflow-y:auto;
    }
    .sidebar::-webkit-scrollbar { width:3px; background:#2a2a2a; }
    .sidebar::-webkit-scrollbar-thumb { background:#555; border-radius:10px; }
    
    .sidebar .menu-item {
      cursor:pointer;
      user-select:none;
      transition:0.1s;
    }
    .sidebar .menu-item .label {
      padding:0.6rem 1rem;
      display:flex;
      justify-content:space-between;
      align-items:center;
      color:#b0b0b0;
      transition:0.1s;
    }
    .sidebar .menu-item .label:hover {
      background:#2a2a2a;
      color:#fff;
    }
    .sidebar .menu-item.active > .label {
      background:#2a2a2a;
      color:#fff;
    }
    .sidebar .menu-item .label i.fa-chevron-down {
      font-size:0.7rem;
      color:#666;
      transition:0.2s;
    }
    .sidebar .menu-item.open > .label i.fa-chevron-down {
      transform:rotate(180deg);
    }
    .sidebar .sub-items {
      max-height:0;
      overflow:hidden;
      transition:max-height 0.3s ease;
    }
    .sidebar .sub-items.open {
      max-height:300px;
    }
    .sidebar .sub-items .sub-item {
      padding:0.4rem 1rem 0.4rem 2rem;
      display:block;
      color:#999;
      transition:0.1s;
      cursor:pointer;
    }
    .sidebar .sub-items .sub-item:hover {
      background:#2a2a2a;
      color:#fff;
    }
    .sidebar .sub-items .sub-item.active {
      background:#2a2a2a;
      color:#fff;
    }
    .sidebar .menu-item-spacer { height:4px; }
    .sidebar .menu-item-bracelets { margin-bottom:8px; }
    
    /* ===== КОНТЕНТ ===== */
    .catalog-content { flex:1; min-width:0; }
    .search-wrap {
      display:flex;
      align-items:center;
      background:#222;
      border:1px solid #333;
      border-radius:40px;
      padding:0.4rem 1.2rem;
      margin-bottom:2rem;
    }
    .search-wrap i { color:#888; margin-right:12px; font-size:1rem; }
    .search-wrap input {
      background:transparent;
      border:none;
      padding:0.6rem 0;
      color:#e0e0e0;
      font-size:0.95rem;
      width:100%;
      outline:none;
    }
    .search-wrap input::placeholder { color:#666; }
    
    /* ===== ТОВАРЫ ===== */
    .product-grid {
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:1.5rem;
    }
    .product-card {
      background:#1e1e1e;
      border:1px solid #2a2a2a;
      border-radius:12px;
      padding:1rem 0.8rem;
      display:flex;
      flex-direction:column;
      transition:0.15s;
    }
    .product-card:hover:not(.placeholder) { border-color:#444; }
    .product-card img {
      width:100%;
      aspect-ratio:1/1;
      object-fit:contain;
      background:#111;
      border-radius:8px;
      margin-bottom:0.6rem;
      cursor:pointer;
      transition:0.2s;
    }
    .product-card img:hover { opacity:0.85; }
    .product-card .name { font-weight:500; color:#f0f0f0; font-size:1rem; margin-bottom:0.2rem; }
    .product-card .weight { font-size:0.8rem; color:#999; margin-bottom:0; }
    .product-card.placeholder {
      background:#1a1a1a;
      border:1px dashed #333;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:#555;
      font-size:0.95rem;
      padding:1.5rem 0.5rem;
      pointer-events:none;
      user-select:none;
    }
    .product-card.placeholder .placeholder-icon {
      font-size:2.2rem;
      color:#2a2a2a;
      margin-bottom:0.5rem;
    }
    .product-card.placeholder .placeholder-text {
      color:#555;
      font-weight:300;
      letter-spacing:0.3px;
    }
    
    /* ===== ПАГИНАЦИЯ ===== */
    .pagination {
      display:flex;
      justify-content:center;
      gap:0.8rem;
      margin-top:2.5rem;
      flex-wrap:wrap;
    }
    .pagination span {
      display:inline-block;
      padding:0.4rem 1rem;
      border:1px solid #333;
      border-radius:30px;
      color:#aaa;
      cursor:default;
      font-size:0.9rem;
      background:#1a1a1a;
      user-select:none;
      transition:0.1s;
    }
    .pagination span.active {
      background:#2a2a2a;
      border-color:#666;
      color:#fff;
    }
    .pagination span:not(.disabled):not(.active) { cursor:pointer; }
    .pagination span:not(.disabled):not(.active):hover { background:#2a2a2a; border-color:#555; }
    .pagination span.disabled { opacity:0.3; pointer-events:none; }
    .pagination.hidden { display:none; }
    
    /* ===== ФУТЕР ===== */
    .footer {
      border-top:1px solid #2a2a2a;
      padding:2.5rem 2rem;
      margin-top:2rem;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:1rem;
      max-width:1440px;
      margin-left:auto;
      margin-right:auto;
      scroll-margin-top: 70px;
    }
    .footer-links {
      display:flex;
      gap:2rem;
      align-items:center;
      flex-wrap:wrap;
    }
    .footer-links a {
      color:#aaa;
      transition:0.2s;
      display:inline-flex;
      align-items:center;
      gap:0.5rem;
    }
    .footer-links a:hover { color:#fff; }
    .footer-copy { color:#666; font-size:0.85rem; text-align:center; }
    
    /* ===== LIGHTBOX ===== */
    .lightbox-overlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.92);
      z-index:9999;
      display:none;
      justify-content:center;
      align-items:center;
      opacity:0;
      transition:opacity 0.3s ease;
      cursor:pointer;
    }
    .lightbox-overlay.active {
      display:flex;
      opacity:1;
    }
    .lightbox-overlay .lightbox-content {
      position:relative;
      max-width:90%;
      max-height:90vh;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:default;
    }
    .lightbox-overlay .lightbox-content img {
      max-width:100%;
      max-height:90vh;
      object-fit:contain;
      border-radius:8px;
      box-shadow:0 20px 60px rgba(0,0,0,0.8);
    }
    .lightbox-overlay .lightbox-close {
      position:fixed;
      top:20px;
      right:30px;
      font-size:2.5rem;
      color:#fff;
      cursor:pointer;
      background:none;
      border:none;
      transition:0.2s;
      z-index:10000;
      opacity:0.7;
    }
    .lightbox-overlay .lightbox-close:hover {
      opacity:1;
      transform:scale(1.1);
    }
    
    /* ===== АДАПТИВ ===== */
    @media (max-width:1024px) {
      .product-grid { grid-template-columns:repeat(4,1fr); }
    }
    @media (max-width:768px) {
      .product-grid { grid-template-columns:repeat(3,1fr); }
      .footer { flex-direction:column; text-align:center; gap:0.8rem; }
      .footer-links { justify-content:center; }
    }
    @media (max-width:640px) {
      .navbar { padding:0 1rem; }
      .nav-links { display:none; }
      .hamburger { display:block; }
      .hero h1 { font-size:2rem; }
      .product-grid { grid-template-columns:repeat(3,1fr); gap:1rem; }
      .footer { padding:1.5rem 1rem; }
      .footer-links { gap:1.2rem; }
      
      .sidebar { display:none !important; }
      .catalog-layout { padding:0.8rem; }
      .catalog-content { width:100%; }
      
      .lightbox-overlay .lightbox-close {
        top:15px;
        right:20px;
        font-size:2rem;
      }
    }
    @media (max-width:480px) {
      body { padding-top:60px; }
      .navbar { height:60px; }
      .hero { padding:1.5rem 1rem; scroll-margin-top: 60px; }
      .hero h1 { font-size:1.6rem; }
      .catalog-layout { padding:0.6rem; scroll-margin-top: 60px; }
      .product-grid { grid-template-columns:repeat(2,1fr); gap:0.8rem; }
      .product-card { padding:0.6rem; }
      .product-card .name { font-size:0.9rem; }
      .product-card.placeholder { padding:1rem 0.3rem; }
      .product-card.placeholder .placeholder-icon { font-size:1.6rem; }
      .lightbox-overlay .lightbox-close {
        top:12px;
        right:16px;
        font-size:1.8rem;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">

  <div class="mobile-nav-links">
    <a href="#hero" class="mobile-link" data-close="true">Главная</a>

  <div class="mobile-divider"></div>

</section>

<!-- Каталог -->
<div class="catalog-layout" id="catalog">
  <aside class="sidebar" id="sidebarMenu"></aside>
  <div class="catalog-content">
    <div class="search-wrap">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Поиск по названию или артикулу...">

    <img id="lightboxImg" src="" alt="Увеличенное изображение">

<footer class="footer" id="footer">
  <div class="footer-links">

    <a href="tel:+74951234567"><i class="fas fa-phone"></i> +7 (495) 123-45-67</a>
  </div>
  <div class="footer-copy">© 2026 ИП Воронин. Все права защищены.</div>
</footer>

<script>
  (function() {
    // ===== ID ТВОЕЙ GOOGLE ТАБЛИЦЫ (УЖЕ ВСТАВЛЕН) =====
    const SHEET_ID = '2PACX-1vTahr2F7Ly52iXRgE6OMzJ45xyY027gl3bp9Od2fqExbOnVdhl9VEIR5LT0IkFUdc3NA5-Fgrwetqkr';

    // ===== ФУНКЦИЯ ЗАГРУЗКИ ДАННЫХ ИЗ ТАБЛИЦЫ =====
    async function loadProductsFromSheet() {
      try {
        // Используем публичный CSV-экспорт (работает для опубликованных таблиц)
        const url = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv`;
        const response = await fetch(url);
        if (!response.ok) throw new Error('Не удалось загрузить таблицу');
        const csvText = await response.text();
        
        // Парсим CSV
        const lines = csvText.split('\n').filter(line => line.trim() !== '');
        if (lines.length < 2) {
          console.warn('Таблица пуста или нет данных');
          return [];
        }

        const products = [];
        // Пропускаем первую строку (заголовки)
        for (let i = 1; i < lines.length; i++) {
          const cols = lines[i].split(',').map(col => col.trim());
          // Ожидаем колонки: Артикул, Вес, Ссылка на фото
          if (cols.length >= 3) {
            const name = cols[0] || 'Без названия';
            const weight = cols[1] || '0 гр.';
            const img = cols[2] || '';
            products.push({
              name: name,
              weight: weight,
              img: img,
              categories: ['all', 'rings', 'classic'] // пока все в категории "кольца"
            });
          }
        }
        return products;
      } catch (error) {
        console.error('Ошибка загрузки данных из Google Таблицы:', error);
        return [];
      }
    }

    // ===== СТРУКТУРА МЕНЮ (без изменений) =====
    const menuData = [
      { key: 'all', label: 'Все товары', children: [] },
      { key: 'rings', label: 'Кольца', children: [
          { key: 'rings', label: 'Все кольца' },
          { key: 'classic', label: 'Классические' },
          { key: 'engagement', label: 'Помолвочные' }
        ] 
      },
      { key: 'wedding', label: 'Обручальные', children: [
          { key: 'wedding', label: 'Все обручальные' },
          { key: 'smooth', label: 'Гладкие' },
          { key: 'diamond', label: 'С алмазной гранью' }
        ] 
      },
      { key: 'earrings', label: 'Серьги', children: [
          { key: 'earrings', label: 'Все серьги' },
          { key: 'gold_ear', label: 'Золотые' },
          { key: 'silver_ear', label: 'Серебряные' }
        ] 
      },
      { key: 'sets', label: 'Гарнитуры', children: [
          { key: 'sets', label: 'Все гарнитуры' },
          { key: 'gold_set', label: 'Золотые' },
          { key: 'silver_set', label: 'Серебряные' }
        ] 
      },
      { key: 'pendants', label: 'Подвески', children: [
          { key: 'pendants', label: 'Все подвески' },
          { key: 'cross', label: 'Кресты' },
          { key: 'charms', label: 'Шармы' }
        ] 
      },
      { key: 'necklaces', label: 'Колье', children: [
          { key: 'necklaces', label: 'Все колье' },
          { key: 'gold_neck', label: 'Золотые' },
          { key: 'silver_neck', label: 'Серебряные' }
        ] 
      },
      { key: 'bracelets_main', label: 'Браслеты', children: [] },
      { key: 'piercing', label: 'Пирсинг', children: [] },
      { key: 'chains_manual', label: 'Цепи/Браслеты (ручная работа)', children: [
          { key: 'chains', label: 'Все цепи' },
          { key: 'bracelets_sub', label: 'Браслеты' }
        ] 
      },
      { key: 'spoons', label: 'Ложки', children: [] },
      { key: 'brooches', label: 'Броши/Булавки', children: [] },
      { key: 'orthodox', label: 'Православные', children: [] },
      { key: 'east', label: 'Восток', children: [] },
      { key: 'misc', label: 'Разное', children: [] }
    ];

    // ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
    let allItems = [];
    let currentCategory = 'all';
    let currentPage = 1;
    const ITEMS_PER_PAGE = 20;

    const grid = document.getElementById('productGrid');
    const paginationEl = document.getElementById('pagination');
    const searchInput = document.getElementById('searchInput');

    // ===== БУРГЕР (без изменений) =====
    const mobileMenu = document.getElementById('mobileMenu');
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileClose = document.getElementById('mobileClose');
    const mobileLinks = document.querySelectorAll('.mobile-link');

    let isMenuOpen = false;

    function toggleMobileMenu(forceState) {
      const shouldOpen = forceState !== undefined ? forceState : !isMenuOpen;
      
      if (shouldOpen) {
        mobileMenu.classList.add('open');
        document.body.style.overflow = 'hidden';
        hamburgerBtn.innerHTML = '<i class="fas fa-times"></i>';
        isMenuOpen = true;
      } else {
        mobileMenu.classList.remove('open');
        document.body.style.overflow = '';
        hamburgerBtn.innerHTML = '<i class="fas fa-bars"></i>';
        isMenuOpen = false;
      }
    }

    hamburgerBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleMobileMenu();
    });

    mobileClose.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleMobileMenu(false);
    });

    mobileLinks.forEach(link => {
      link.addEventListener('click', function(e) {
        const target = this.getAttribute('href');
        toggleMobileMenu(false);
        
        setTimeout(() => {
          if (target && target.startsWith('#')) {
            const element = document.querySelector(target);
            if (element) {
              element.scrollIntoView({ behavior: 'smooth' });
            }
          }
        }, 200);
      });
    });

    document.addEventListener('click', function(e) {
      if (isMenuOpen) {
        const isClickOnMenu = mobileMenu.contains(e.target);
        const isClickOnHamburger = hamburgerBtn.contains(e.target);
        if (!isClickOnMenu && !isClickOnHamburger) {
          toggleMobileMenu(false);
        }
      }
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && isMenuOpen) {
        toggleMobileMenu(false);
      }
    });

    // ===== LIGHTBOX (без изменений) =====
    const lightboxOverlay = document.getElementById('lightboxOverlay');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');

    function openLightbox(imgSrc) {
      lightboxImg.src = imgSrc;
      lightboxOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightboxOverlay.classList.remove('active');
      document.body.style.overflow = '';
      setTimeout(() => {
        lightboxImg.src = '';
      }, 300);
    }

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
    });
    window.openLightbox = openLightbox;

    // ===== ФИЛЬТРАЦИЯ =====
    function getFilteredItems() {
      const searchTerm = searchInput.value.toLowerCase().trim();
      return allItems.filter(item => {
        let catMatch = currentCategory === 'all' || item.categories.includes(currentCategory);
        if (!catMatch) return false;
        if (searchTerm === '') return true;
        return item.name.toLowerCase().includes(searchTerm);
      });
    }

    // ===== РЕНДЕР ТОВАРОВ =====
    function renderProducts() {
      const filtered = getFilteredItems();
      const totalReal = filtered.length;
      
      if (totalReal === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem 0; color:#777;">Товары не найдены</div>`;
        renderPagination(0);
        return;
      }

      const start = (currentPage - 1) * ITEMS_PER_PAGE;
      const end = Math.min(start + ITEMS_PER_PAGE, totalReal);
      let realItems = filtered.slice(start, end);
      
      // Убираем логику с плейсхолдерами, так как количество товаров может быть любым
      let html = '';
      realItems.forEach(item => {
        const imgSrc = item.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%231a1a1a%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%22 y=%22110%22 font-family=%22Inter%22 font-size=%2214%22 fill=%22%23666%22%3E%D0%9D%D0%B5%D1%82 %D1%84%D0%BE%D1%82%D0%BE%3C/text%3E%3C/svg%3E';
        html += `
          <div class="product-card" data-id="${item.id || Math.random()}">
            <img src="${imgSrc}" alt="${item.name}" loading="lazy" onclick="openLightbox('${imgSrc}')" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%231a1a1a%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%22 y=%22110%22 font-family=%22Inter%22 font-size=%2214%22 fill=%22%23666%22%3E%D0%98%D0%B7%D0%BE%D0%B1%D1%80%D0%B0%D0%B6%D0%B5%D0%BD%D0%B8%D0%B5%3C/text%3E%3C/svg%3E'">
            <div class="name">${item.name}</div>
            <div class="weight">${item.weight}</div>
          </div>
        `;
      });

      grid.innerHTML = html;

      const totalPages = Math.ceil(totalReal / ITEMS_PER_PAGE);
      renderPagination(totalPages);
    }

    // ===== ПАГИНАЦИЯ =====
    function renderPagination(totalPages) {
      if (totalPages <= 1) {
        paginationEl.innerHTML = '';
        paginationEl.classList.add('hidden');
        return;
      }
      paginationEl.classList.remove('hidden');
      let html = '';
      html += `<span class="${currentPage === 1 ? 'disabled' : ''}" data-page="${currentPage - 1}"><i class="fas fa-chevron-left"></i></span>`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<span class="${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</span>`;
      }
      html += `<span class="${currentPage === totalPages ? 'disabled' : ''}" data-page="${currentPage + 1}"><i class="fas fa-chevron-right"></i></span>`;
      paginationEl.innerHTML = html;

      paginationEl.querySelectorAll('span[data-page]').forEach(span => {
        span.addEventListener('click', function(e) {
          const page = parseInt(this.dataset.page);
          if (isNaN(page) || page < 1 || page > totalPages) return;
          if (page === currentPage) return;
          currentPage = page;
          updateURL(page);
          renderProducts();
          grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
    }

    function updateURL(page) {
      const url = new URL(window.location);
      if (page > 1) {
        url.searchParams.set('page', page);
      } else {
        url.searchParams.delete('page');
      }
      window.history.replaceState({ page: page }, '', url);
    }

    function getPageFromURL() {
      const params = new URLSearchParams(window.location.search);
      const page = parseInt(params.get('page'));
      if (page && page >= 1) {
        return page;
      }
      return 1;
    }

    // ===== РЕНДЕР МЕНЮ (без изменений) =====
    function renderMenu(container, isMobile) {
      let html = '';
      
      menuData.forEach((cat, index) => {
        const hasChildren = cat.children && cat.children.length > 0;
        const isActive = cat.key === currentCategory;
        
        let extraClass = '';
        if (cat.key === 'bracelets_main') {
          extraClass = ' menu-item-bracelets';
        }
        
        html += `<div class="menu-item${extraClass} ${isActive ? 'active' : ''}" data-key="${cat.key}">`;
        html += `<div class="label" data-key="${cat.key}">`;
        html += `<span>${cat.label}</span>`;
        if (hasChildren) {
          html += `<i class="fas fa-chevron-down"></i>`;
        }
        html += `</div>`;
        if (hasChildren) {
          html += `<div class="sub-items" data-parent="${cat.key}">`;
          cat.children.forEach(sub => {
            const isSubActive = sub.key === currentCategory;
            html += `<a class="sub-item ${isSubActive ? 'active' : ''}" data-key="${sub.key}">${sub.label}</a>`;
          });
          html += `</div>`;
        }
        html += `</div>`;
        
        if (index < menuData.length - 1) {
          html += `<div class="menu-item-spacer"></div>`;
        }
      });
      
      container.innerHTML = html;

      container.querySelectorAll('.menu-item > .label').forEach(label => {
        label.addEventListener('click', function(e) {
          const parent = this.closest('.menu-item');
          const key = this.dataset.key;
          const subItems = parent.querySelector('.sub-items');
          
          const hasChildren = subItems !== null;
          
          if (hasChildren) {
            const isOpen = subItems.classList.contains('open');
            
            container.querySelectorAll('.sub-items').forEach(s => s.classList.remove('open'));
            container.querySelectorAll('.menu-item').forEach(m => m.classList.remove('open'));
            
            if (!isOpen) {
              subItems.classList.add('open');
              parent.classList.add('open');
            }
          } else {
            if (key) {
              setActiveCategory(key);
              currentPage = 1;
              updateURL(1);
              if (isMobile && window.innerWidth < 640) {
                toggleMobileMenu(false);
              }
            }
          }
        });
      });

      container.querySelectorAll('.sub-item').forEach(item => {
        item.addEventListener('click', function(e) {
          e.stopPropagation();
          const key = this.dataset.key;
          if (key) {
            setActiveCategory(key);
            currentPage = 1;
            updateURL(1);
            if (isMobile && window.innerWidth < 640) {
              toggleMobileMenu(false);
            }
          }
        });
      });
    }

    function renderSidebar() {
      const sidebar = document.getElementById('sidebarMenu');
      renderMenu(sidebar, false);
    }

    function renderMobileCatalog() {
      const mobileCatalog = document.getElementById('mobileCatalog');
      renderMenu(mobileCatalog, true);
    }

    function setActiveCategory(key) {
      currentCategory = key;
      
      document.querySelectorAll('.sidebar .menu-item, .sidebar .sub-item, .mobile-catalog .menu-item, .mobile-catalog .sub-item').forEach(el => {
        el.classList.remove('active');
      });
      
      const desktopItem = document.querySelector(`.sidebar .menu-item[data-key="${key}"]`);
      if (desktopItem) {
        desktopItem.classList.add('active');
      }
      document.querySelectorAll('.sidebar .sub-item').forEach(sub => {
        if (sub.dataset.key === key) {
          sub.classList.add('active');
        }
      });
      
      const mobileItem = document.querySelector(`.mobile-catalog .menu-item[data-key="${key}"]`);
      if (mobileItem) {
        mobileItem.classList.add('active');
      }
      document.querySelectorAll('.mobile-catalog .sub-item').forEach(sub => {
        if (sub.dataset.key === key) {
          sub.classList.add('active');
        }
      });
      
      renderProducts();
    }

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    async function init() {
      // Загружаем данные из Google Таблицы
      allItems = await loadProductsFromSheet();
      
      // Если данных нет — показываем сообщение
      if (allItems.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem 0; color:#777;">Нет товаров в каталоге. Добавьте их в Google Таблицу.</div>`;
        // Меню всё равно рендерим
        renderSidebar();
        renderMobileCatalog();
        return;
      }

      // Добавляем id и категории (пока все — 'rings')
      allItems = allItems.map((item, idx) => ({
        ...item,
        id: idx,
        categories: ['all', 'rings', 'classic'] // при желании можно расширить логику категорий
      }));

      const pageFromURL = getPageFromURL();
      currentPage = pageFromURL;
      
      renderSidebar();
      renderMobileCatalog();
      setActiveCategory('all');
      
      renderProducts();
      
      searchInput.addEventListener('input', function() {
        currentPage = 1;
        updateURL(1);
        renderProducts();
      });
      
      let resizeTimeout;
      window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          renderMobileCatalog();
          setActiveCategory(currentCategory);
        }, 300);
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  })();
</script>

</body>
</html>
