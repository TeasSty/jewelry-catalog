<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ-панель — ИП Воронин</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#141414;
    --bg-card:#1f1f1f;
    --line:#2d2d2d;
    --text:#f5f5f5;
    --text-dim:#858585;
    --accent:#c9a24b;
    --danger:#e53935;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    padding:40px 20px;
  }
  .container{max-width:600px;margin:0 auto;}
  h1{font-size:24px;margin-bottom:24px;font-weight:700;}
  .card{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:28px;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
  }
  .form-group{margin-bottom:20px;}
  label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:8px;font-weight:500;}
  input, select{
    width:100%;
    background:#292929;
    border:1px solid var(--line);
    color:#fff;
    padding:12px 14px;
    border-radius:6px;
    font-size:14px;
    outline:none;
    font-family:inherit;
  }
  input:focus, select:focus{border-color:var(--accent);}
  .hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    display: block;
  }
  button.submit-btn{
    width:100%;
    background:var(--accent);
    color:#141414;
    border:none;
    padding:14px;
    border-radius:6px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:opacity 0.2s;
    margin-top:10px;
  }
  button.submit-btn:hover{opacity:0.9;}
  button.submit-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .status{
    margin-top:16px;
    padding:12px;
    border-radius:6px;
    font-size:14px;
    display:none;
    text-align:center;
  }
  .status.success{background:rgba(76,175,80,0.1);color:#4caf50;border:1px solid rgba(76,175,80,0.3);}
  .status.error{background:rgba(229,57,53,0.1);color:var(--danger);border:1px solid rgba(229,57,53,0.3);}
  .logout-btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    float: right;
    margin-top: -50px;
  }
  .logout-btn:hover { color:#fff; border-color:#fff; }
  #authContainer { max-width: 400px; margin: 100px auto; }
</style>
</head>
<body>

<!-- ОКНО АВТОРИЗАЦИИ -->
<div id="authContainer" class="card">
  <h1 style="text-align:center;">Вход в админку</h1>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="authEmail" placeholder="admin@example.com">
  </div>
  <div class="form-group">
    <label>Пароль</label>
    <input type="password" id="authPassword" placeholder="••••••••">
  </div>
  <button class="submit-btn" id="loginBtn">Войти</button>
  <div id="authStatus" class="status error"></div>
</div>

<!-- ОСНОВНОЙ ИНТЕРФЕЙС ДОБАВЛЕНИЯ ТОВАРА -->
<div class="container" id="adminInterface" style="display:none;">
  <button class="logout-btn" id="logoutBtn">Выйти</button>
  <h1>Добавление изделия в каталог</h1>
  
  <div class="card">
    <form id="productForm">
      <div class="form-group">
        <label>Артикул (SKU)</label>
        <input type="text" id="sku" placeholder="Например: КП-141" required>
      </div>

      <div class="form-group">
        <label>Вес изделия (граммы)</label>
        <input type="text" id="weight" placeholder="Например: 2.45" required>
      </div>

      <div class="form-group">
        <label>Основная категория</label>
        <select id="category" required>
          <option value="">Выберите категорию...</option>
          <option value="Кольца">Кольца</option>
          <option value="Обручальные">Обручальные</option>
          <option value="Серьги">Серьги</option>
          <option value="Гарнитуры">Гарнитуры</option>
          <option value="Подвески">Подвески</option>
          <option value="Колье">Колье</option>
          <option value="Браслеты">Браслеты</option>
          <option value="Пирсинг">Пирсинг</option>
          <option value="Цепи/Браслеты (ручная работа)">Цепи/Браслеты (ручная работа)</option>
          <option value="Ложки">Ложки</option>
          <option value="Броши">Броши</option>
          <option value="Православные">Православные</option>
          <option value="Восток">Восток</option>
          <option value="Разное">Разное</option>
        </select>
      </div>

      <div class="form-group">
        <label>Подкатегория (необязательно)</label>
        <select id="subcategory">
          <option value="">Без подкатегории</option>
        </select>
      </div>

      <div class="form-group">
        <label>Имя файла фотографии</label>
        <!-- Текстовое поле вместо загрузчика файлов. Не тратит платный трафик. -->
        <input type="text" id="imageName" placeholder="Например: kp-141.jpg" required>
        <span class="hint">Вручную поместите этот файл в папку <b>images/</b> вашего проекта перед деплоем.</span>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Сохранить в Firestore</button>
    </form>

    <div id="statusMessage" class="status"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDKo5f366jIkLQVlrL9GHIHt_6dgHvIhUs",
    authDomain: "voronin-jewelry.firebaseapp.com",
    projectId: "voronin-jewelry",
    messagingSenderId: "1067796651938",
    appId: "1:1067796651938:web:3d89a194660765b4869cfb",
    measurementId: "G-FJ9Z8C6YG"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Карта соответствия подкатегорий
  const subcatMap = {
    "Кольца": ["Классические", "Помолвочные"],
    "Обручальные": ["Гладкие", "С алмазной гранью"],
    "Серьги": ["Золотые", "Серебряные"],
    "Гарнитуры": ["Золотые", "Серебряные"],
    "Подвески": ["Кресты", "Шармы"],
    "Колье": ["Золотые", "Серебряные"],
    "Цепи/Браслеты (ручная работа)": ["Все цепи", "Браслеты"]
  };

  // Переключение списков подкатегорий при выборе категории
  document.getElementById("category").addEventListener("change", (e) => {
    const cat = e.target.value;
    const subSelect = document.getElementById("subcategory");
    subSelect.innerHTML = '<option value="">Без подкатегории</option>';
    
    if(subcatMap[cat]) {
      subcatMap[cat].forEach(sub => {
        subSelect.innerHTML += `<option value="${sub}">${sub}</option>`;
      });
    }
  });

  // Отслеживание авторизации
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("authContainer").style.display = "none";
      document.getElementById("adminInterface").style.display = "block";
    } else {
      document.getElementById("authContainer").style.display = "block";
      document.getElementById("adminInterface").style.display = "none";
    }
  });

  // Логин
  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("authEmail").value.trim();
    const pass = document.getElementById("authPassword").value.trim();
    const authStatus = document.getElementById("authStatus");

    try {
      authStatus.style.display = "none";
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(err) {
      authStatus.innerText = "Ошибка авторизации: " + err.message;
      authStatus.style.display = "block";
    }
  });

  // Выход
  document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

  // Добавление товара формы
  document.getElementById("productForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    
    const submitBtn = document.getElementById("submitBtn");
    const statusMsg = document.getElementById("statusMessage");
    
    const sku = document.getElementById("sku").value.trim();
    const weight = document.getElementById("weight").value.trim();
    const category = document.getElementById("category").value;
    const subcategory = document.getElementById("subcategory").value;
    let imageName = document.getElementById("imageName").value.trim();

    // Форматируем путь, чтобы в базе всегда хранилась структура с приставкой папки
    if (imageName && !imageName.startsWith("images/")) {
      imageName = "images/" + imageName;
    }

    try {
      submitBtn.disabled = true;
      statusMsg.style.display = "none";

      // Сохраняем текстовые данные напрямую в Firestore (Firebase Storage не задействован)
      await addDoc(collection(db, "products"), {
        sku: sku,
        weight: weight,
        category: category,
        subcategory: subcategory,
        img: imageName,
        createdAt: new Date().toISOString()
      });

      statusMsg.className = "status success";
      statusMsg.innerText = `Товар ${sku} успешно сохранен! Не забудьте скопировать файл в /images/.`;
      statusMsg.style.display = "block";

      // Сброс формы (кроме категорий для удобства потокового ввода)
      document.getElementById("sku").value = "";
      document.getElementById("weight").value = "";
      document.getElementById("imageName").value = "";

    } catch (error) {
      console.error(error);
      statusMsg.className = "status error";
      statusMsg.innerText = "Ошибка сохранения: " + error.message;
      statusMsg.style.display = "block";
    } finally {
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
