  <style>

    button:hover { background: #dfb353; }

      ["items558-t.jpg","кп-040","3.18","кольца","помолвочные"]
    ];

    document.getElementById("startBtn").addEventListener("click", async () => {
      const statusDiv = document.getElementById("status");
      statusDiv.innerHTML = "Начинаю импорт...<br>";
      
      const productsRef = collection(db, "products");
      let count = 0;

      for (const item of rawItems) {
        try {
          await addDoc(productsRef, {
            img: item[0],
            sku: item[1],
            weight: item[2],
            category: item[3],
            subcategory: item[4],
            createdAt: new Date() // добавим дату создания для сортировки в будущем
          });
          count++;
          statusDiv.innerHTML += `✓ Добавлен: ${item[1]} (${count}/${rawItems.length})<br>`;
        } catch (error) {
          statusDiv.innerHTML += `<span style="color:red">✗ Ошибка на артикуле ${item[1]}: ${error.message}</span><br>`;
          console.error(error);
          break; // останавливаемся при ошибке
        }
      }

      if (count === rawItems.length) {
        statusDiv.innerHTML += "<strong><br>🎉 Все 48 товаров успешно импортированы в Cloud Firestore!</strong>";
      }
    });
  </script>
</body>
